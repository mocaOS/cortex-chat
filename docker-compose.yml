services:
  cortex-chat:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        # GlitchTip source map upload (optional; build succeeds without it).
        SENTRY_AUTH_TOKEN: ${SENTRY_AUTH_TOKEN:-}
        # Release naming for GlitchTip; Coolify populates SOURCE_COMMIT.
        SOURCE_COMMIT: ${SOURCE_COMMIT:-}
    environment:
      CORTEX_API_URL: ${CORTEX_API_URL:-http://localhost:8000}
      BACKEND_ADMIN_API_KEY: ${BACKEND_ADMIN_API_KEY}
      SUPERADMIN_EMAIL: ${SUPERADMIN_EMAIL}
      SUPERADMIN_PASSWORD: ${SUPERADMIN_PASSWORD}
      APP_ENCRYPTION_KEY: ${APP_ENCRYPTION_KEY}
      # GlitchTip environment tag (DSN default is baked into the app;
      # override with SENTRY_DSN / disable with SENTRY_DISABLED=1 if needed).
      SENTRY_ENVIRONMENT: ${SENTRY_ENVIRONMENT:-production}
      # Email / SMTP (optional — password reset is off unless SMTP_HOST is set).
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_SECURE: ${SMTP_SECURE:-false}
      SMTP_FROM: ${SMTP_FROM:-}
      APP_BASE_URL: ${APP_BASE_URL:-}
    ports:
      - "${PORT:-3000}:3000"
    volumes:
      - cortex-chat-data:/app/data
    restart: unless-stopped

volumes:
  cortex-chat-data:
